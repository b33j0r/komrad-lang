examples_dir = "./examples"

[capture_maps.komrad]
comment = "comment"
symbol = "variable"
handler = "handler"
"capture.variable" = "capture.variable"
"capture.block" = "capture.block"
"predicate.variable" = "predicate.variable"
"predicate.operator" = "predicate.operator"
"predicate.keyword" = "keyword"
"predicate.string" = "string"
"predicate.number" = "number"
string = "string"
number = "number"
keyword = "keyword"
operator = "operator"
"punctuation.delimiter" = "delimiter"
"punctuation.bracket" = "bracket"

[[parsers.komrad]]
adapter = "nom"
grammar_files = ["./crates/komrad-parser/src/**/*.rs", "./crates/komrad-core/src/ast.rs"]
highlight_captures = "komrad"

[parsers.komrad.build]
preset = "cargo-wasm-bindgen"
package = "komrad-highlighter"

[parsers.komrad.runtime]
parse_export = "parse_to_json"

[[filetypes.komrad]]
extensions = ["*.kom", "*.komrad"]
parser = "komrad"
